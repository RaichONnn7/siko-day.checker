<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>シコ日チェッカー</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Zen+Kaku+Gothic+New:wght@400;700;900&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --accent: #ff2d78;
    --accent2: #ff6eb0;
    --glow: #ff2d7855;
    --text: #f0e6ff;
    --muted: #776688;
    --border: #2a1a3a;
    --success: #44ffaa;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === BACKGROUND === */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, #ff2d7811 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 80%, #8b00ff11 0%, transparent 60%),
      repeating-linear-gradient(0deg, transparent, transparent 40px, #ffffff03 40px, #ffffff03 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, #ffffff03 40px, #ffffff03 41px);
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    z-index: 1;
    max-width: 600px;
    margin: 0 auto;
    padding: 20px;
    min-height: 100vh;
  }

  /* === HEADER === */
  .header {
    text-align: center;
    padding: 40px 0 30px;
  }

  .logo {
    font-family: 'Orbitron', monospace;
    font-size: clamp(24px, 6vw, 38px);
    font-weight: 900;
    color: var(--accent);
    text-shadow: 0 0 20px var(--glow), 0 0 60px var(--glow);
    letter-spacing: 2px;
    animation: pulse 3s ease-in-out infinite;
  }

  .logo span {
    color: var(--text);
    text-shadow: none;
  }

  .tagline {
    color: var(--muted);
    font-size: 13px;
    margin-top: 8px;
    letter-spacing: 1px;
  }

  @keyframes pulse {
    0%, 100% { text-shadow: 0 0 20px var(--glow), 0 0 60px var(--glow); }
    50% { text-shadow: 0 0 30px var(--glow), 0 0 80px var(--glow), 0 0 120px var(--glow); }
  }

  /* === CARDS === */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    margin-bottom: 20px;
    backdrop-filter: blur(10px);
  }

  .card-title {
    font-size: 14px;
    font-weight: 700;
    color: var(--muted);
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-bottom: 20px;
  }

  /* === FORMS === */
  .form-group {
    margin-bottom: 16px;
  }

  label {
    display: block;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 16px;
    color: var(--text);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }

  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--glow);
  }

  /* === BUTTONS === */
  .btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 10px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .btn-primary {
    background: var(--accent);
    color: white;
    box-shadow: 0 4px 20px var(--glow);
  }

  .btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px var(--glow);
  }

  .btn-primary:active { transform: translateY(0); }

  .btn-ghost {
    background: transparent;
    color: var(--muted);
    border: 1px solid var(--border);
  }

  .btn-ghost:hover { color: var(--text); border-color: var(--muted); }

  .btn-danger {
    background: transparent;
    color: #ff6060;
    border: 1px solid #ff606044;
    font-size: 12px;
    padding: 8px;
  }

  .btn-danger:hover { background: #ff606011; }

  /* === SHIKO BUTTON === */
  .shiko-area {
    text-align: center;
    padding: 20px 0;
  }

  #shiko-btn {
    width: 180px;
    height: 180px;
    border-radius: 50%;
    border: none;
    background: radial-gradient(circle at 40% 35%, #ff6eb0, #ff2d78, #c0006a);
    box-shadow:
      0 0 0 8px #ff2d7833,
      0 0 0 16px #ff2d7811,
      0 8px 40px #ff2d7888;
    color: white;
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 36px;
    font-weight: 900;
    cursor: pointer;
    transition: all 0.15s;
    animation: breathe 3s ease-in-out infinite;
    position: relative;
    z-index: 1;
  }

  #shiko-btn:hover {
    transform: scale(1.08);
    box-shadow:
      0 0 0 12px #ff2d7844,
      0 0 0 24px #ff2d7818,
      0 12px 60px #ff2d78aa;
  }

  #shiko-btn:active {
    transform: scale(0.94);
    animation: none;
  }

  @keyframes breathe {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.03); }
  }

  .shiko-hint {
    color: var(--muted);
    font-size: 12px;
    margin-top: 16px;
    letter-spacing: 1px;
  }

  /* === STATS === */
  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 12px;
    margin-bottom: 24px;
  }

  .stat-box {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 10px;
    text-align: center;
  }

  .stat-num {
    font-family: 'Orbitron', monospace;
    font-size: 26px;
    font-weight: 700;
    color: var(--accent);
    line-height: 1;
  }

  .stat-label {
    font-size: 11px;
    color: var(--muted);
    margin-top: 4px;
    letter-spacing: 0.5px;
  }

  /* === HISTORY === */
  .history-list {
    max-height: 360px;
    overflow-y: auto;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  .history-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 14px;
    border-radius: 10px;
    margin-bottom: 8px;
    background: var(--surface2);
    border-left: 3px solid var(--accent);
    animation: slideIn 0.3s ease;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .history-date {
    font-size: 13px;
    color: var(--text);
    font-weight: 700;
  }

  .history-time {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    color: var(--accent2);
    margin-top: 2px;
  }

  .history-del {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 16px;
    padding: 4px 8px;
    border-radius: 6px;
    transition: all 0.2s;
  }

  .history-del:hover { color: #ff6060; background: #ff606011; }

  .empty-state {
    text-align: center;
    color: var(--muted);
    padding: 30px;
    font-size: 13px;
    line-height: 1.8;
  }

  /* === TOAST === */
  #toast {
    position: fixed;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    background: var(--success);
    color: #001a0a;
    padding: 12px 28px;
    border-radius: 100px;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 1px;
    z-index: 999;
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    white-space: nowrap;
  }

  #toast.show { transform: translateX(-50%) translateY(0); }
  #toast.error { background: var(--accent); color: white; }

  /* === TABS === */
  .tab-row {
    display: flex;
    gap: 8px;
    margin-bottom: 20px;
  }

  .tab {
    flex: 1;
    padding: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Zen Kaku Gothic New', sans-serif;
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  /* === USER BAR === */
  .user-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 16px;
    margin-bottom: 20px;
    font-size: 13px;
  }

  .user-bar strong { color: var(--accent2); }

  .logout-btn {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 12px;
    font-family: 'Zen Kaku Gothic New', sans-serif;
  }

  .logout-btn:hover { color: var(--accent); }

  /* === STREAK BADGE === */
  .streak {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: linear-gradient(135deg, #ff6eb022, #ff2d7822);
    border: 1px solid #ff2d7844;
    border-radius: 100px;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 700;
    color: var(--accent2);
    margin-top: 12px;
  }

  .hidden { display: none !important; }

  /* === CALENDAR HEATMAP === */
  .heatmap {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 4px;
    margin-top: 12px;
  }

  .heatmap-day {
    aspect-ratio: 1;
    border-radius: 3px;
    background: var(--surface2);
    transition: background 0.2s;
  }

  .heatmap-day.active { background: var(--accent); opacity: 0.85; }
  .heatmap-day.today { box-shadow: 0 0 0 2px var(--accent2); }

  .heatmap-labels {
    display: flex;
    justify-content: space-between;
    font-size: 10px;
    color: var(--muted);
    margin-top: 4px;
  }

  .section-sub {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
    margin-bottom: 10px;
  }

  .divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }
</style>
</head>
<body>

<div id="app">
  <div class="header">
    <div class="logo">シコ日<span>チェッカー</span></div>
    <div class="tagline">記録する。管理する。誇る。</div>
  </div>

  <!-- ログイン/登録フォーム -->
  <div id="auth-section">
    <div class="card">
      <div class="tab-row">
        <button class="tab active" onclick="switchTab('login')">ログイン</button>
        <button class="tab" onclick="switchTab('register')">新規登録</button>
      </div>

      <div id="login-form">
        <div class="form-group">
          <label>ユーザーID</label>
          <input type="text" id="login-user" placeholder="ユーザーIDを入力" autocomplete="username">
        </div>
        <div class="form-group">
          <label>パスワード</label>
          <input type="password" id="login-pass" placeholder="パスワードを入力" autocomplete="current-password">
        </div>
        <button class="btn btn-primary" onclick="login()">ログイン</button>
      </div>

      <div id="register-form" class="hidden">
        <div class="form-group">
          <label>ユーザーID（英数字）</label>
          <input type="text" id="reg-user" placeholder="好きなIDを決めてください" autocomplete="username">
        </div>
        <div class="form-group">
          <label>パスワード</label>
          <input type="password" id="reg-pass" placeholder="6文字以上" autocomplete="new-password">
        </div>
        <div class="form-group">
          <label>パスワード（確認）</label>
          <input type="password" id="reg-pass2" placeholder="もう一度入力" autocomplete="new-password">
        </div>
        <button class="btn btn-primary" onclick="register()">アカウント作成</button>
      </div>

      <p style="font-size:11px; color:var(--muted); text-align:center; margin-top:16px; line-height:1.7;">
        ※ データはこのブラウザ内（localStorage）に保存されます。<br>
        他のデバイスとは同期されません。
      </p>
    </div>
  </div>

  <!-- メイン画面 -->
  <div id="main-section" class="hidden">
    <div class="user-bar">
      <span>👤 <strong id="username-display"></strong> でログイン中</span>
      <button class="logout-btn" onclick="logout()">ログアウト</button>
    </div>

    <!-- シコボタン -->
    <div class="card" style="text-align:center;">
      <div class="shiko-area">
        <button id="shiko-btn" onclick="recordShiko()">シコ！</button>
        <div class="shiko-hint">ボタンを押して記録</div>
        <div id="streak-badge" class="streak hidden">
          🔥 <span id="streak-num">0</span>日連続！
        </div>
      </div>
    </div>

    <!-- 統計 -->
    <div class="card">
      <div class="card-title">📊 あなたの記録</div>
      <div class="stats-grid">
        <div class="stat-box">
          <div class="stat-num" id="stat-total">0</div>
          <div class="stat-label">総回数</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="stat-month">0</div>
          <div class="stat-label">今月</div>
        </div>
        <div class="stat-box">
          <div class="stat-num" id="stat-today">0</div>
          <div class="stat-label">今日</div>
        </div>
      </div>

      <!-- ヒートマップ -->
      <div class="section-sub">過去28日間</div>
      <div class="heatmap" id="heatmap"></div>
      <div class="heatmap-labels">
        <span>28日前</span>
        <span>今日</span>
      </div>
    </div>

    <!-- 履歴 -->
    <div class="card">
      <div class="card-title" style="display:flex; justify-content:space-between; align-items:center;">
        <span>📅 記録履歴</span>
        <button class="btn-danger btn" style="width:auto;" onclick="clearAll()">全削除</button>
      </div>
      <div class="history-list" id="history-list">
        <div class="empty-state">
          まだ記録がありません。<br>上のボタンを押してスタート！
        </div>
      </div>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
// ========== STATE ==========
let currentUser = null;

// ========== STORAGE HELPERS ==========
function getUsers() {
  return JSON.parse(localStorage.getItem('shiko_users') || '{}');
}

function saveUsers(users) {
  localStorage.setItem('shiko_users', JSON.stringify(users));
}

function getUserRecords(username) {
  const users = getUsers();
  return users[username]?.records || [];
}

function saveUserRecords(username, records) {
  const users = getUsers();
  if (!users[username]) return;
  users[username].records = records;
  saveUsers(users);
}

// ========== AUTH ==========
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i === 0) === (tab === 'login'));
  });
  document.getElementById('login-form').classList.toggle('hidden', tab !== 'login');
  document.getElementById('register-form').classList.toggle('hidden', tab !== 'register');
}

function register() {
  const username = document.getElementById('reg-user').value.trim();
  const pass = document.getElementById('reg-pass').value;
  const pass2 = document.getElementById('reg-pass2').value;

  if (!username || !/^[a-zA-Z0-9_]{2,20}$/.test(username)) {
    showToast('IDは2〜20文字の英数字・アンダーバーのみです', true); return;
  }
  if (pass.length < 6) {
    showToast('パスワードは6文字以上にしてください', true); return;
  }
  if (pass !== pass2) {
    showToast('パスワードが一致しません', true); return;
  }

  const users = getUsers();
  if (users[username]) {
    showToast('そのIDはすでに使われています', true); return;
  }

  // 簡易ハッシュ（本番環境ではbcrypt等を使用すること）
  users[username] = { pass: simpleHash(pass), records: [] };
  saveUsers(users);
  showToast('アカウント作成完了！ログインしてください');
  switchTab('login');
  document.getElementById('login-user').value = username;
}

function login() {
  const username = document.getElementById('login-user').value.trim();
  const pass = document.getElementById('login-pass').value;

  const users = getUsers();
  if (!users[username] || users[username].pass !== simpleHash(pass)) {
    showToast('IDまたはパスワードが違います', true); return;
  }

  currentUser = username;
  sessionStorage.setItem('shiko_session', username);
  showMainSection();
}

function logout() {
  currentUser = null;
  sessionStorage.removeItem('shiko_session');
  document.getElementById('auth-section').classList.remove('hidden');
  document.getElementById('main-section').classList.add('hidden');
  showToast('ログアウトしました');
}

function simpleHash(str) {
  // 簡易チェックサム（デモ用。実運用には不向き）
  let hash = 5381;
  for (let i = 0; i < str.length; i++) {
    hash = ((hash << 5) + hash) + str.charCodeAt(i);
    hash |= 0;
  }
  return 'h' + Math.abs(hash).toString(36);
}

// ========== SHIKO LOGIC ==========
function recordShiko() {
  const now = new Date();
  const records = getUserRecords(currentUser);
  records.unshift(now.toISOString());
  saveUserRecords(currentUser, records);

  // アニメーション
  const btn = document.getElementById('shiko-btn');
  btn.style.transform = 'scale(0.85)';
  setTimeout(() => { btn.style.transform = ''; }, 150);

  updateUI();
  showToast('✅ 記録しました！ ' + formatTime(now));
}

function deleteRecord(index) {
  const records = getUserRecords(currentUser);
  records.splice(index, 1);
  saveUserRecords(currentUser, records);
  updateUI();
  showToast('削除しました');
}

function clearAll() {
  if (!confirm('本当に全記録を削除しますか？')) return;
  saveUserRecords(currentUser, []);
  updateUI();
  showToast('全記録を削除しました');
}

// ========== UI UPDATE ==========
function updateUI() {
  const records = getUserRecords(currentUser).map(r => new Date(r));
  const now = new Date();
  const todayStr = dateStr(now);
  const monthStr = now.getFullYear() + '-' + String(now.getMonth() + 1).padStart(2, '0');

  // Stats
  document.getElementById('stat-total').textContent = records.length;
  document.getElementById('stat-month').textContent =
    records.filter(r => dateStr(r).startsWith(monthStr)).length;
  document.getElementById('stat-today').textContent =
    records.filter(r => dateStr(r) === todayStr).length;

  // Streak
  const streak = calcStreak(records);
  const badge = document.getElementById('streak-badge');
  if (streak >= 2) {
    badge.classList.remove('hidden');
    document.getElementById('streak-num').textContent = streak;
  } else {
    badge.classList.add('hidden');
  }

  // Heatmap (28 days)
  const heatmap = document.getElementById('heatmap');
  heatmap.innerHTML = '';
  const dayCounts = {};
  records.forEach(r => {
    const d = dateStr(r);
    dayCounts[d] = (dayCounts[d] || 0) + 1;
  });

  for (let i = 27; i >= 0; i--) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    const ds = dateStr(d);
    const div = document.createElement('div');
    div.className = 'heatmap-day' + (dayCounts[ds] ? ' active' : '') + (ds === todayStr ? ' today' : '');
    div.title = ds + (dayCounts[ds] ? ` (${dayCounts[ds]}回)` : '');
    heatmap.appendChild(div);
  }

  // History
  const list = document.getElementById('history-list');
  const rawRecords = getUserRecords(currentUser);
  if (rawRecords.length === 0) {
    list.innerHTML = '<div class="empty-state">まだ記録がありません。<br>上のボタンを押してスタート！</div>';
    return;
  }

  list.innerHTML = '';
  rawRecords.forEach((iso, idx) => {
    const d = new Date(iso);
    const item = document.createElement('div');
    item.className = 'history-item';
    item.innerHTML = `
      <div>
        <div class="history-date">${formatDate(d)}</div>
        <div class="history-time">${formatTime(d)}</div>
      </div>
      <button class="history-del" onclick="deleteRecord(${idx})" title="削除">✕</button>
    `;
    list.appendChild(item);
  });
}

function calcStreak(records) {
  if (records.length === 0) return 0;
  const days = [...new Set(records.map(r => dateStr(r)))].sort().reverse();
  const today = dateStr(new Date());
  if (days[0] !== today) return 0;
  let streak = 1;
  for (let i = 1; i < days.length; i++) {
    const prev = new Date(days[i - 1]);
    const curr = new Date(days[i]);
    prev.setDate(prev.getDate() - 1);
    if (dateStr(prev) === days[i]) streak++;
    else break;
  }
  return streak;
}

function showMainSection() {
  document.getElementById('auth-section').classList.add('hidden');
  document.getElementById('main-section').classList.remove('hidden');
  document.getElementById('username-display').textContent = currentUser;
  updateUI();
}

// ========== UTILS ==========
function dateStr(d) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function formatDate(d) {
  const days = ['日', '月', '火', '水', '木', '金', '土'];
  return `${d.getFullYear()}年${d.getMonth() + 1}月${d.getDate()}日（${days[d.getDay()]}）`;
}

function formatTime(d) {
  return String(d.getHours()).padStart(2, '0') + ':' + String(d.getMinutes()).padStart(2, '0') + ':' + String(d.getSeconds()).padStart(2, '0');
}

let toastTimer;
function showToast(msg, isError = false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = isError ? 'error show' : 'show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.className = ''; }, 2500);
}

// ========== INIT ==========
window.addEventListener('load', () => {
  const session = sessionStorage.getItem('shiko_session');
  if (session && getUsers()[session]) {
    currentUser = session;
    showMainSection();
  }

  // Enter key support
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Enter') return;
    if (!document.getElementById('login-form').classList.contains('hidden')) login();
    else if (!document.getElementById('register-form').classList.contains('hidden')) register();
  });
});
</script>
</body>
